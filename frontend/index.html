<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>图片格式转换控制台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/styles.css?v=20260418d" />
  </head>
  <body>
    <div class="page-shell">
      <aside class="sidebar">
        <div class="brand-block">
          <div class="brand-logo">✦</div>
          <div>
            <p class="brand-kicker">Media Pipeline</p>
            <h1>图片转换控制台</h1>
          </div>
        </div>

        <nav class="side-nav">
          <button class="nav-item is-active" data-tab="convert">
            <span class="nav-dot"></span>
            <div>
              <strong>图片转换</strong>
              <small>手动选择目录，一次性批量转换</small>
            </div>
          </button>
          <button class="nav-item" data-tab="watch">
            <span class="nav-dot"></span>
            <div>
              <strong>自动监听</strong>
              <small>监听目录变更并自动处理</small>
            </div>
          </button>
          <button class="nav-item" data-tab="studio">
            <span class="nav-dot"></span>
            <div>
              <strong>视觉与策略</strong>
              <small>背景图、命名策略与展示偏好</small>
            </div>
          </button>
        </nav>

        <div class="status-card">
          <p class="section-label">服务状态</p>
          <div id="statusBanner" class="status-banner pending">正在检测服务...</div>
        </div>
      </aside>

      <main class="main-shell">
        <header class="topbar">
          <div>
            <p class="section-label">OVH · Debian 12 · Docker Compose</p>
            <h2 id="pageTitle">图片转换</h2>
          </div>
          <div class="image-badge">ghcr.io/lc010224/img-converter:latest</div>
        </header>

        <section class="panel is-active" data-panel="convert">
          <div class="hero-panel">
            <div>
              <p class="section-label">批量任务</p>
              <h3>创建一次图片格式转换任务</h3>
              <p class="lead-text">浅色模式、弹窗式目录选择、单数据根目录管理。</p>
            </div>
          </div>

          <form id="conversion-form" class="content-grid">
            <section class="card form-card wide">
              <div class="card-head">
                <div>
                  <p class="section-label">目录选择</p>
                  <h3>源目录与输出目录</h3>
                </div>
              </div>

              <div class="field-stack">
                <label class="path-field-group">
                  <span>源图片目录</span>
                  <div class="path-input-wrap">
                    <input id="sourcePathDisplay" class="path-display-input" value="/data" readonly />
                    <button type="button" class="folder-trigger" data-open-picker="source" aria-label="选择源目录">
                      <span class="folder-trigger__icon">📁</span>
                    </button>
                  </div>
                </label>

                <label class="path-field-group">
                  <span>输出目录</span>
                  <div class="path-input-wrap">
                    <input id="outputPathDisplay" class="path-display-input" value="/data" readonly />
                    <button type="button" class="folder-trigger" data-open-picker="output" aria-label="选择输出目录">
                      <span class="folder-trigger__icon">📁</span>
                    </button>
                  </div>
                </label>
              </div>
            </section>

            <aside class="card form-card side">
              <div class="card-head compact">
                <div>
                  <p class="section-label">转换参数</p>
                  <h3>输出规则</h3>
                </div>
              </div>

              <div class="field-stack">
                <label>
                  <span>目标格式</span>
                  <select id="targetFormat" name="targetFormat">
                    <option value="webp">webp</option>
                    <option value="jpeg">jpeg</option>
                    <option value="png">png</option>
                  </select>
                </label>

                <label>
                  <span>转换质量</span>
                  <input id="quality" name="quality" type="number" min="1" max="100" value="80" required />
                </label>

                <label>
                  <span>需要处理的原始格式</span>
                  <div class="checkbox-group">
                    <label><input type="checkbox" name="inputFormats" value="jpg" checked /> jpg</label>
                    <label><input type="checkbox" name="inputFormats" value="jpeg" checked /> jpeg</label>
                    <label><input type="checkbox" name="inputFormats" value="jpe" /> jpe</label>
                    <label><input type="checkbox" name="inputFormats" value="jfif" /> jfif</label>
                    <label><input type="checkbox" name="inputFormats" value="png" checked /> png</label>
                    <label><input type="checkbox" name="inputFormats" value="webp" /> webp</label>
                    <label><input type="checkbox" name="inputFormats" value="gif" /> gif</label>
                    <label><input type="checkbox" name="inputFormats" value="bmp" /> bmp</label>
                    <label><input type="checkbox" name="inputFormats" value="dib" /> dib</label>
                    <label><input type="checkbox" name="inputFormats" value="ico" /> ico</label>
                    <label><input type="checkbox" name="inputFormats" value="tif" /> tif</label>
                    <label><input type="checkbox" name="inputFormats" value="tiff" /> tiff</label>
                    <label><input type="checkbox" name="inputFormats" value="pbm" /> pbm</label>
                    <label><input type="checkbox" name="inputFormats" value="pgm" /> pgm</label>
                    <label><input type="checkbox" name="inputFormats" value="pnm" /> pnm</label>
                    <label><input type="checkbox" name="inputFormats" value="ppm" /> ppm</label>
                    <label><input type="checkbox" name="inputFormats" value="heic" /> heic</label>
                    <label><input type="checkbox" name="inputFormats" value="heif" /> heif</label>
                    <label><input type="checkbox" name="inputFormats" value="avif" /> avif</label>
                    <label><input type="checkbox" name="inputFormats" value="svg" /> svg</label>
                  </div>
                </label>

                <label class="toggle-row">
                  <input id="deleteOriginal" name="deleteOriginal" type="checkbox" />
                  <span>转换成功后删除原图</span>
                </label>

                <button type="submit" class="primary-btn">开始转换</button>
              </div>
            </aside>
          </form>

          <section class="card result-card">
            <div class="card-head compact">
              <div>
                <p class="section-label">最近结果</p>
                <h3>执行日志与返回内容</h3>
              </div>
            </div>
            <pre id="resultBox" class="result-box">等待执行任务...</pre>
          </section>
        </section>

        <section class="panel" data-panel="watch">
          <div class="content-grid single-column">
            <section class="card form-card wide">
              <div class="card-head">
                <div>
                  <p class="section-label">自动监听</p>
                  <h3>监听目录变化并自动转换</h3>
                </div>
              </div>
              <div class="field-stack two-column-fields">
                <label class="path-field-group">
                  <span>监听原目录</span>
                  <div class="path-input-wrap">
                    <input id="watchSourceDisplay" class="path-display-input" value="/data" readonly />
                    <button type="button" class="folder-trigger" data-open-picker="watchSource" aria-label="选择监听目录">
                      <span class="folder-trigger__icon">📁</span>
                    </button>
                  </div>
                </label>
                <label class="path-field-group">
                  <span>输出目录</span>
                  <div class="path-input-wrap">
                    <input id="watchOutputDisplay" class="path-display-input" value="/data" readonly />
                    <button type="button" class="folder-trigger" data-open-picker="watchOutput" aria-label="选择监听输出目录">
                      <span class="folder-trigger__icon">📁</span>
                    </button>
                  </div>
                </label>
                <label>
                  <span>监听时间间隔（秒）</span>
                  <input type="number" value="15" />
                </label>
                <label>
                  <span>自动转换格式</span>
                  <select>
                    <option>webp</option>
                    <option>jpeg</option>
                    <option>png</option>
                  </select>
                </label>
                <label>
                  <span>质量</span>
                  <input type="number" value="82" />
                </label>
                <label>
                  <span>背景图 URL</span>
                  <input value="https://images.example.com/bg.jpg" />
                </label>
              </div>
              <div class="checkbox-group stacked">
                <label><input type="checkbox" checked /> 自动创建输出目录</label>
                <label><input type="checkbox" checked /> 忽略隐藏文件</label>
                <label><input type="checkbox" /> 转换完成删除原图</label>
                <label><input type="checkbox" checked /> 启动容器后自动恢复监听</label>
              </div>
              <button type="button" class="primary-btn secondary-btn">保存监听配置</button>
            </section>
          </div>
        </section>

        <section class="panel" data-panel="studio">
          <div class="content-grid single-column">
            <section class="card form-card wide">
              <div class="card-head">
                <div>
                  <p class="section-label">视觉与策略</p>
                  <h3>显示偏好与默认输出行为</h3>
                </div>
              </div>
              <div class="field-stack two-column-fields">
                <label>
                  <span>背景图 URL</span>
                  <input value="https://images.example.com/cover.jpg" />
                </label>
                <label>
                  <span>主题风格</span>
                  <select>
                    <option>清透浅色</option>
                    <option>柔光白金</option>
                    <option>米白工作台</option>
                  </select>
                </label>
                <label>
                  <span>结果显示方式</span>
                  <select>
                    <option>JSON 原样显示</option>
                    <option>摘要优先</option>
                    <option>表格优先</option>
                  </select>
                </label>
                <label>
                  <span>默认命名策略</span>
                  <select>
                    <option>保留原名</option>
                    <option>添加后缀</option>
                    <option>添加时间戳</option>
                  </select>
                </label>
              </div>
              <button type="button" class="primary-btn secondary-btn">保存显示策略</button>
            </section>
          </div>
        </section>
      </main>
    </div>

    <div id="folderModal" class="modal-backdrop" aria-hidden="true">
      <div class="modal-card modal-card--compact" role="dialog" aria-modal="true" aria-labelledby="folderModalTitle">
        <div class="modal-head">
          <h3 id="folderModalTitle">选择路径</h3>
          <button type="button" class="modal-close" data-close-modal="true">×</button>
        </div>

        <div id="modalTree" class="modal-tree"></div>

        <div class="modal-footer">
          <div class="modal-current">当前路径：<span id="modalCurrentPath">/data</span></div>
          <div class="modal-actions">
            <button type="button" class="footer-btn" data-cancel-modal="true">取消</button>
            <button type="button" class="footer-btn footer-btn--primary" id="modalConfirmBtn">确认</button>
          </div>
        </div>
      </div>
    </div>

    <script src="/assets/app.js?v=20260418d"></script>
  </body>
</html>
