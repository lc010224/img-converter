services:
  backend:
    build:
      context: ./backend
    container_name: image-converter-backend
    restart: unless-stopped
    volumes:
      - /:/host
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: image-converter-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
